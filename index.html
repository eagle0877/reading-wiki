<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Reading Wiki</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lora:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap');
  :root { --ink: #1a1209; --paper: #f5f0e8; --cream: #ede7d3; --amber: #c8783a; --amber-light: #e8a96a; --amber-dark: #8b4f1e; --border: #cfc4ae; --sidebar-w: 280px; --header-h: 60px; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Lora', serif; background: var(--paper); color: var(--ink); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
  header { height: var(--header-h); background: var(--ink); display: flex; align-items: center; padding: 0 20px; gap: 16px; border-bottom: 3px solid var(--amber); flex-shrink: 0; z-index: 100; }
  header h1 { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--paper); flex: 1; }
  header h1 span { color: var(--amber-light); font-style: italic; }
  #search-box { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 4px; color: var(--paper); padding: 6px 12px; width: 200px; outline: none; }
  .header-btn { background: var(--amber); color: var(--ink); border: none; padding: 6px 14px; border-radius: 3px; cursor: pointer; font-size: 0.8rem; font-weight: 600; }
  .workspace { display: flex; flex: 1; overflow: hidden; }
  aside { width: var(--sidebar-w); background: var(--cream); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; flex-shrink: 0; }
  .sidebar-section { border-bottom: 1px solid var(--border); }
  .sidebar-section-title { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; text-transform: uppercase; color: var(--muted); padding: 10px 16px 6px; }
  .sidebar-list { list-style: none; padding-bottom: 6px; }
  .sidebar-list li { padding: 5px 16px; font-size: 0.87rem; cursor: pointer; display: flex; align-items: center; gap: 8px; border-left: 3px solid transparent; }
  .sidebar-list li:hover { background: rgba(200,120,58,0.1); border-left-color: var(--amber); }
  .count { margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 0.68rem; color: #7a6e5f; background: var(--border); padding: 1px 6px; border-radius: 10px; }
  .sync-btn { width: calc(100% - 32px); margin: 4px 16px 12px; padding: 8px; font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; text-transform: uppercase; background: none; border: 1px dashed var(--amber); color: var(--amber-dark); cursor: pointer; text-align: left; }
  main { flex: 1; overflow-y: auto; padding: 28px 36px; }
  .view-title { font-family: 'Playfair Display', serif; font-size: 1.9rem; font-weight: 700; margin-bottom: 20px; }
  .book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .book-card { background: #fff; border: 1px solid var(--border); display: flex; gap: 14px; padding: 12px; cursor: pointer; border-radius: 4px; }
  .card-cover { width: 60px; height: 90px; background: var(--cream); object-fit: cover; }
  .book-title { font-family: 'Playfair Display', serif; font-size: 0.95rem; font-weight: 600; }
  .book-author { font-size: 0.8rem; color: #7a6e5f; font-style: italic; }
  #tiddler-view, #new-view { display: none; }
</style>
</head>
<body>

<header>
  <h1>📚 My <span>Reading Wiki</span></h1>
  <input type="text" id="search-box" placeholder="Search..." oninput="handleSearch(this.value)">
  <button class="header-btn" onclick="showNewView()">＋ Add Book</button>
</header>

<div class="workspace">
  <aside>
    <div class="sidebar-section">
      <div class="sidebar-section-title">Browse</div>
      <ul class="sidebar-list">
        <li onclick="showTOC('all')">🏠 All Books <span class="count" id="cnt-all">0</span></li>
        <li onclick="showTOC('reading')">📖 Reading <span class="count" id="cnt-reading">0</span></li>
        <li onclick="showTOC('finished')">✅ Finished <span class="count" id="cnt-finished">0</span></li>
      </ul>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-title">Sync & Backup</div>
      <button class="sync-btn" onclick="exportData()">📤 Export Library (.json)</button>
      <button class="sync-btn" onclick="document.getElementById('import-file').click()">📥 Import Library</button>
      <input type="file" id="import-file" style="display:none" onchange="importData(event)">
    </div>
  </aside>

  <main id="main-content">
    <div id="toc-view">
      <div class="view-title" id="toc-title">All Books</div>
      <div id="toc-content" class="book-grid"></div>
    </div>
  </main>
</div>

<script>
let books = JSON.parse(localStorage.getItem('readingWikiBooks')) || [];
let activeFilter = 'all';

function save() { localStorage.setItem('readingWikiBooks', JSON.stringify(books)); renderTOC(); }

function exportData() {
    const dataStr = JSON.stringify({ books: books }, null, 2);
    const blob = new Blob([dataStr], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.href = url;
    link.download = "library_backup.json";
    link.click();
}

function importData(event) {
    const file = event.target.files;
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        try {
            const imported = JSON.parse(e.target.result);
            // Handle both wrapped and unwrapped JSON formats
            const newBooks = Array.isArray(imported) ? imported : (imported.books || []);
            if (newBooks.length > 0) {
                books = [...books, ...newBooks.filter(nb => !books.some(b => b.id === nb.id))];
                save();
                alert("Import successful!");
            }
        } catch (err) { alert("Error: File is not a valid library backup."); }
    };
    reader.readAsText(file);
}

function renderTOC() {
    let list = [...books];
    if (activeFilter === 'reading') list = list.filter(b => b.status === 'reading');
    if (activeFilter === 'finished') list = list.filter(b => b.status === 'finished');
    
    document.getElementById('cnt-all').textContent = books.length;
    document.getElementById('cnt-reading').textContent = books.filter(b=>b.status==='reading').length;
    document.getElementById('cnt-finished').textContent = books.filter(b=>b.status==='finished').length;

    document.getElementById('toc-content').innerHTML = list.map(b => `
        <div class="book-card">
            <div style="flex:1">
                <div class="book-title">${b.title}</div>
                <div class="book-author">${b.author}</div>
            </div>
        </div>
    `).join('');
}

function showTOC(f) { activeFilter = f; renderTOC(); }
function handleSearch(q) { /* search logic */ }
function showNewView() { /* add book logic */ }

renderTOC();
</script>
</body>
</html>
